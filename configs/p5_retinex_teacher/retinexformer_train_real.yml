name: Enhancement_RetinexFormer_LOL_v2_real
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100
datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv2/Real_captured/Train/Normal
    dataroot_lq: data/LOLv2/Real_captured/Train/Low
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8
    mini_batch_sizes:
    - 8
    iters:
    - 300000
    gt_size: 256
    gt_sizes:
    - 256
    dataset_enlarge_ratio: 1
    prefetch_mode: null
  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: /home/user/a1_rlef_project/data/LOL-v2/Real_captured/Train/Normal
    dataroot_lq: /home/user/a1_rlef_project/data/LOL-v2/Real_captured/Train/Low
    io_backend:
      type: disk
network_g:
  type: RetinexFormer
  in_channels: 3
  out_channels: 3
  n_feat: 40
  stage: 1
  num_blocks:
  - 1
  - 2
  - 2
path:
  pretrain_network_g: null
  strict_load_g: true
  resume_state: null
train:
  total_iter: 150000
  warmup_iter: -1
  use_grad_clip: true
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods:
    - 46000
    - 104000
    restart_weights:
    - 1
    - 1
    eta_mins:
    - 0.0003
    - 1.0e-06
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: Adam
    lr: 0.0002
    betas:
    - 0.9
    - 0.999
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean
val:
  window_size: 4
  val_freq: 1000.0
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
logger:
  print_freq: 500
  save_checkpoint_freq: 1000.0
  use_tb_logger: true
  wandb:
    project: low_light
    resume_id: null
dist_params:
  backend: nccl
  port: 29500
